on:
  workflow_dispatch: 
jobs:
  this:
    runs-on: macos-latest
    steps:
      - run: brew install tailscale
      - run: sudo tailscaled &
      - run: sudo tailscale up
      - run: sudo dscl localhost -passwd /Local/Default/Users/runner newpassword
      - run: sudo systemsetup -setremotelogin on
      - run: sleep 60000
