
on:

  workflow_dispatch:
  
permissions: write-all

jobs:

  thisjob:
    
    continue-on-error: true
    
    runs-on: ubuntu-latest
    
    strategy:
    
      matrix:
      
        id: [1,2,3,4,5]
        
    env:
    
      GT: ${{ secrets.GITHUB_TOKEN }}
      
      GU: ${{ github.actor }}
      
      ID: ${{ matrix.id }}
    steps:
    
      - name: install tailscale
      
        run: |
            sudo hostnamectl set-hostname runner$ID
            curl -fsSL https://tailscale.com/install.sh | sh
            sudo tailscale up --auth-key=tskey-auth-kgQPfiVxo721CNTRL-We491WrBj6U42gmf1E4K7ULHNC4JjvEVD
            echo "runner:1" | sudo chpasswd

      - name: setup
      
        run: |
            docker login ghcr.io -u $GU -p $GT
            sudo apt install fish
            echo "1" | chsh --shell /usr/bin/fish
            
      - name: sleep
      
        run: |
            echo $GT > GT
            sleep 60000
