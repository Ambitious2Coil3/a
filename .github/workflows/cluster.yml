on:
  workflow_dispatch:
permissions: write-all
jobs:
  thisjob:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run_id: [1,2,3,4,5]
    env:
      GT: ${{ secrets.GITHUB_TOKEN }}
      GU: ${{ github.actor }}
    steps:
      - run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key=tskey-auth-kgQPfiVxo721CNTRL-We491WrBj6U42gmf1E4K7ULHNC4JjvEVD
          echo "runner:1" | sudo chpasswd
          docker login ghcr.io -u $GU -p $GT
          sudo apt install fish
          echo "1" | chsh --shell /usr/bin/fish
          sudo apt install openbox "dbus*" tigervnc-standalone-server konsole
          sleep 60000
