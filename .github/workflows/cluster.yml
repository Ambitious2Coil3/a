on:
  workflow_dispatch:
permissions: write-all
jobs:
  thisjob:
    concurrency:
      queue: single
      group: group
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run_id: [1,2,3,4,5]
    env:
      GT: ${{ secrets.GITHUB_TOKEN }}
      GU: ${{ github.actor }}
      ID: ${{ matrix.run_id }}
    steps:
      - run: sudo hostnamectl set-hostname runner$ID
      - run: curl -fsSL https://tailscale.com/install.sh | sh
      - run: sudo tailscale up --auth-key=tskey-auth-kgQPfiVxo721CNTRL-We491WrBj6U42gmf1E4K7ULHNC4JjvEVD
      - run: echo "runner:1" | sudo chpasswd
      - run: docker login ghcr.io -u $GU -p $GT
      - run: sudo apt install fish
      - run: |
          if [ "$ID" == "1" ] ; then
          echo "1" | chsh --shell /usr/bin/fish
          fi
      - run: sudo apt install openbox "dbus*" tigervnc-standalone-server konsole "openmpi*"
      - run: sleep 60000
