on:
  workflow_dispatch:
permissions: write-all
jobs:
  thisjob:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run_id: [1,2,3,4,5]
    steps:
      - run: curl -fsSL https://tailscale.com/install.sh | sh && sudo tailscale up --auth-key=tskey-auth-kTsjQXiThN11CNTRL-ZywJkhKxCdBo5JUfe2aqdBnMBgkQFFy4
      - run: echo "runner:1" | sudo chpasswd
      - env:
          GT: ${{ secrets.GITHUB_TOKEN }}
          GU: ${{ github.actor }}
        run: | 
           echo $GT > GT
           echo $GU > GU
      - run: | 
          sudo apt install fish
          echo "1" | chsh --shell /usr/bin/fish
      - run: |
          sudo swapoff -a
          sudo fallocate swap -l 24G
          sudo mkswap swap
          sudo swapon swap
      - run: sudo apt install openbox "dbus*" tigervnc-standalone-server konsole
      - run: |
          for i in $(seq 0 9); do wget https://github.com/Ambitious2Coil3/a/releases/download/localai/ai.tar.0$i ; done
          for i in $(seq 0 3); do wget https://github.com/Ambitious2Coil3/a/releases/download/localai/ai.tar.1$i ; done
      - run: |
          cat ai.tar.* > ai.tar
          rm ai.tar.*
      - run: docker import ai.tar ai:latest
      - run: rm ai.tar
      - run: docker run -itd -p 11434:11434 --name gemma ai:latest bash
      - run: sleep 60000
